# Railway deployment manifest.
# Runtime container is intentionally CPU-light: docling/PyTorch live behind
# the optional `ingestion` extra and are NOT installed here.

[build]
builder = "NIXPACKS"
buildCommand = "pip install --no-cache-dir uv && uv sync --no-dev --frozen"

[deploy]
startCommand = "uv run alembic -c alembic.ini upgrade head && uv run uvicorn --factory parts_lookup.api.main:create_app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
