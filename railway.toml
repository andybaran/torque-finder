# Railway deployment manifest (repo-root copy so `railway up` auto-detects it).
# Source of truth mirrored from infra/railway.toml.
# Runtime container is intentionally CPU-light: docling/PyTorch live behind
# the optional `ingestion` extra and are NOT installed here.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh scripts/start.sh"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
